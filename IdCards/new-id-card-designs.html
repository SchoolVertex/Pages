<!DOCTYPE html>
<html lang="en" ng-app="myApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student ID Card - Design Previews</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-sanitize.min.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --school-color: blue;
      --text-color: black;
      --school-name-font-size: 12px;
      --student-photo-height: 80px;
      --student-photo-border-radius: 50%;
      --student-photo-object-fit: cover;
      --accent-color: #c02026;
      --school-name-line1-font-size: 12px;
      --school-name-line1-font-family: Arial, Helvetica, sans-serif;
      --school-name-line2-font-size: 11px;
      --school-name-line2-font-family: Arial, Helvetica, sans-serif;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #e9eef2;
      margin: 0;
      padding: 0;
      display: block !important;
    }

    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 20px;
      align-items: center;
      background: #fff;
      padding: 10px 14px;
      border-bottom: 1px solid #ccc;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .control-group label {
      font-size: 14px;
      margin-right: 6px;
      font-weight: 600;
    }

    .control-group input[type="checkbox"] {
      margin-right: 6px;
      vertical-align: middle;
    }

    .control-panel-extra {
      display: none;
      width: 100%;
      flex-basis: 100%;
      gap: 16px 20px;
      flex-wrap: wrap;
      align-items: center;
      padding-top: 4px;
      border-top: 1px dashed #ddd;
      margin-top: 2px;
    }

    .control-panel-extra.is-open {
      display: flex;
    }

    .school-name-two-line {
      display: block;
      line-height: 1.15;
      font-weight: 700;
    }

    .school-name-two-line .school-name-line1 {
      display: block;
      font-family: var(--school-name-line1-font-family, Arial, Helvetica, sans-serif);
      font-size: var(--school-name-line1-font-size, 12px);
    }

    .school-name-two-line .school-name-line2 {
      display: block;
      font-family: var(--school-name-line2-font-family, Arial, Helvetica, sans-serif);
      font-size: var(--school-name-line2-font-size, 11px);
    }

    .settings-json-btn {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #1a2b56;
      color: #fff;
      border: none;
      border-radius: 4px;
    }

    .settings-json-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .settings-json-modal.is-open {
      display: flex;
    }

    .settings-json-dialog {
      background: #fff;
      border-radius: 8px;
      width: min(560px, 100%);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .settings-json-dialog header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #ddd;
      font-weight: 700;
    }

    .settings-json-dialog pre {
      margin: 0;
      padding: 14px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.4;
      background: #f7f8fa;
      flex: 1;
    }

    .settings-json-dialog footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 12px 14px;
      border-top: 1px solid #ddd;
    }

    .settings-json-dialog button {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .settings-json-dialog button.primary {
      background: #1a2b56;
      color: #fff;
      border-color: #1a2b56;
    }

    select,
    input[type="number"] {
      padding: 4px;
      font-size: 14px;
    }

    select {
      min-width: 150px;
    }

    #id-card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      padding: 20px;
      max-width: 1800px;
      margin: 0 auto;
    }

    .id-card {
      width: 2.125in;
      height: 3.375in;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
      background: #fff;
      transform: scale(0.95);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .id-card:hover {
      transform: scale(1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card-identifier {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 20px;
      height: 20px;
      color: black;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      z-index: 10;
    }

    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* ══════════════ STANDARD FORMAT ══════════════ */
    .format-standard .main-content {
      height: 325px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 4mm;
      border-radius: 10px;
      position: relative;
      z-index: 1;
    }

    .format-standard .school-info {
      display: flex;
      align-items: center;
      gap: 2px;
      width: 100%;
      color: #2c3e50;
      border-bottom: 1px solid var(--school-color);
      text-align: center;
    }

    .format-standard .school-logo {
      height: 47px;
    }

    .format-standard .school-logo img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .format-standard .school-name {
      font-size: var(--school-name-font-size, 12px);
      font-weight: 700;
    }

    .format-standard .school-caption,
    .format-standard .school-affliate,
    .format-standard .school-address {
      font-size: 6px;
      font-weight: 600;
      font-style: italic;
    }

    .format-standard .school-address {
      font-size: 5px;
      font-weight: bold;
      font-style: normal;
    }

    .format-standard .student-photo-area {
      width: var(--student-photo-height);
      height: var(--student-photo-height);
      border-radius: var(--student-photo-border-radius);
      border: 2px solid #fff;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
      overflow: hidden;
      margin-top: 3px;
    }

    .format-standard .student-photo-area img {
      width: 100%;
      height: 100%;
      object-fit: var(--student-photo-object-fit, cover);
    }

    .format-standard .student-name {
      margin-top: 2px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .format-standard .student-info {
      text-align: left;
      padding-top: 2px;
      width: 90%;
    }

    .format-standard .info-row {
      display: flex;
      margin-bottom: 3px;
      font-size: 8px;
      color: #000;
      font-weight: 600;
    }

    .format-standard .info-label {
      font-weight: 600;
      width: 42px;
      flex-shrink: 0;
    }

    .format-standard .principal-signature-area {
      color: #000;
      padding-bottom: 25px;
      text-align: center;
      margin-top: auto;
    }

    .format-standard .principal-sign {
      margin: -5px;
    }

    .format-standard .principal-sign img {
      height: 20px;
    }

    .format-standard .principal-label {
      font-size: 8px;
      letter-spacing: 0.5px;
      border-top: 1px solid #000;
    }

    .format-standard .school-color {
      color: var(--school-color);
    }

    .format-standard .school-name-dynamic {
      font-size: var(--school-name-font-size);
    }

    .format-standard .school-name-two-line {
      color: var(--school-color);
    }

    .format-ridgeboard .school-title.school-name-two-line,
    .format-ridgeboard .school-name-two-line {
      color: var(--school-color);
    }

    .format-standard .text-color {
      color: var(--text-color);
    }

    /* ══════════════ RIDGEBOARD FORMAT ══════════════ */
    .format-ridgeboard .id-card {
      border-radius: 10px;
    }

    .format-ridgeboard .bg-image {
      opacity: 0.25;
    }

    .format-ridgeboard .main-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 8px 0;
      position: relative;
      z-index: 1;
      font-family: 'Source Sans 3', sans-serif;
    }

    .format-ridgeboard .school-info {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      width: 100%;
      border-bottom: none;
    }

    .format-ridgeboard .school-logo {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
    }

    .format-ridgeboard .school-logo img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }

    .format-ridgeboard .school-name-block {
      flex: 1;
      min-width: 0;
      text-align: center;
      padding-top: 1px;
    }

    .format-ridgeboard .school-title {
      font-family: 'Libre Baskerville', serif;
      font-weight: 700;
      font-size: var(--school-name-font-size);
      line-height: 1.15;
      color: var(--school-color);
      display: block;
    }

    .format-ridgeboard .school-title-sub {
      display: block;
    }

    .format-ridgeboard .school-name-two-line .school-name-line2.school-title-sub {
      font-size: var(--school-name-line2-font-size, 11px);
    }

    .format-ridgeboard .school-tagline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin: 3px 0 2px;
    }

    .format-ridgeboard .school-tagline::before,
    .format-ridgeboard .school-tagline::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--accent-color);
      max-width: 28px;
    }

    .format-ridgeboard .school-tagline span {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 7px;
      color: var(--accent-color);
      white-space: nowrap;
    }

    .format-ridgeboard .school-address {
      font-size: 5.5px;
      font-weight: 600;
      color: var(--text-color);
      line-height: 1.25;
      text-align: center;
      font-style: normal;
    }

    .format-ridgeboard .header-divider {
      width: 100%;
      height: 1px;
      background: var(--school-color);
      margin: 2px 0;
      flex-shrink: 0;
    }

    .format-ridgeboard .student-photo-area {
      width: var(--student-photo-height);
      height: var(--student-photo-height);
      border-radius: var(--student-photo-border-radius);
      border: 1.5px solid var(--school-color);
      overflow: hidden;
      flex-shrink: 0;
      background: #ddd;
      position: relative;
      z-index: 2;
      box-shadow: none;
      margin-top: 2px;
    }

    .format-ridgeboard .student-photo-area img {
      width: 100%;
      height: 100%;
      object-fit: var(--student-photo-object-fit, cover);
      display: block;
    }

    .format-ridgeboard .student-name-banner {
      margin-top: 2px;
      background: var(--school-color);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      text-align: center;
      padding: 2px 22px;
      width: 96%;
      line-height: 1.25;
      position: relative;
      z-index: 1;
      clip-path: polygon(
        0% 0%,
        100% 0%,
        calc(100% - 14px) 50%,
        100% 100%,
        0% 100%,
        14px 50%
      );
    }

    .format-ridgeboard .student-info {
      width: 94%;
      margin-top: 3px;
      border: 1.25px solid var(--school-color);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: #fff;
      text-align: left;
      padding-top: 0;
    }

    .format-ridgeboard .info-row {
      display: grid;
      grid-template-columns: 18px 54px 1fr;
      min-height: 16px;
      border-bottom: 1px solid #b8bfcc;
      margin-bottom: 0;
      font-size: inherit;
    }

    .format-ridgeboard .info-row:last-child {
      border-bottom: none;
    }

    .format-ridgeboard .info-icon-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--school-color);
      padding: 2px 0;
    }

    .format-ridgeboard .info-icon-cell .icon {
      width: 10px;
      height: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .format-ridgeboard .info-icon-cell .icon svg {
      width: 10px;
      height: 10px;
      fill: #fff;
    }

    .format-ridgeboard .info-label-cell {
      display: flex;
      align-items: center;
      background: var(--school-color);
      color: #fff;
      padding: 2px 2px 2px 0;
      font-size: 7px;
      font-weight: 700;
      white-space: nowrap;
    }

    .format-ridgeboard .info-value {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 2px 5px;
      font-size: 7px;
      font-weight: 700;
      color: var(--text-color);
      line-height: 1.2;
      word-break: break-word;
    }

    .format-ridgeboard .info-row.address-row {
      min-height: 22px;
    }

    .format-ridgeboard .info-row.address-row .info-value {
      font-size: 6.5px;
    }

    .format-ridgeboard .card-footer {
      margin-top: auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .format-ridgeboard .principal-signature-area {
      text-align: center;
      width: 55%;
      padding-bottom: 0;
      margin-top: 0;
    }

    .format-ridgeboard .principal-label {
      font-size: 7px;
      font-weight: 700;
      color: var(--text-color);
      border-top: 1px solid var(--text-color);
      letter-spacing: 0.2px;
    }

    /* ══════════════ SIMPLE FORMAT ══════════════ */
    .format-simple .id-card {
      border-radius: 10px;
    }

    .format-simple .side-accent {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 42px;
      height: 72%;
      z-index: 0;
      pointer-events: none;
    }

    .format-simple .side-accent svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .format-simple .main-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 4mm 4mm 3mm;
      border-radius: 10px;
      position: relative;
      z-index: 1;
    }

    .format-simple .school-info {
      display: flex;
      align-items: center;
      gap: 2px;
      width: 100%;
      color: #2c3e50;
      border-bottom: 1px solid var(--school-color);
      text-align: center;
    }

    .format-simple .school-logo {
      height: 47px;
    }

    .format-simple .school-logo img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .format-simple .school-name {
      font-size: var(--school-name-font-size, 12px);
      font-weight: 700;
    }

    .format-simple .school-caption,
    .format-simple .school-affliate,
    .format-simple .school-address {
      font-size: 6px;
      font-weight: 600;
      font-style: italic;
    }

    .format-simple .school-address {
      font-size: 5px;
      font-weight: bold;
      font-style: normal;
    }

    .format-simple .school-color {
      color: var(--school-color);
    }

    .format-simple .school-name-dynamic {
      font-size: var(--school-name-font-size);
    }

    .format-simple .school-name-two-line {
      color: var(--school-color);
    }

    .format-simple .text-color {
      color: var(--text-color);
    }

    .format-simple .student-photo-area {
      width: var(--student-photo-height);
      height: var(--student-photo-height);
      border-radius: var(--student-photo-border-radius);
      border: 1.5px solid #87ceeb;
      box-shadow: none;
      flex-shrink: 0;
      overflow: hidden;
      margin-top: 14px;
      background: #eee;
    }

    .format-simple .student-photo-area img {
      width: 100%;
      height: 100%;
      object-fit: var(--student-photo-object-fit, cover);
      display: block;
    }

    .format-simple .student-name {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      color: var(--school-color);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      width: 90%;
      line-height: 1.25;
    }

    .format-simple .simple-class-info {
      margin-top: 4px;
      text-align: center;
      width: 90%;
    }

    .format-simple .simple-class-line {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-color);
      letter-spacing: 0.3px;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .format-simple .principal-signature-area {
      margin-top: auto;
      align-self: flex-end;
      text-align: center;
      padding: 0 6px 4px 0;
      width: auto;
      min-width: 70px;
    }

    .format-simple .principal-sign {
      margin: 0;
      min-height: 18px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .format-simple .principal-sign img {
      height: 22px;
      max-width: 80px;
      object-fit: contain;
    }

    .format-simple .principal-label {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--text-color);
      border-top: none;
      margin-top: 2px;
    }

    @media print {
      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }

      .control-bar {
        display: none;
      }

      .settings-json-modal {
        display: none !important;
      }

      .id-card {
        page-break-after: always;
        break-after: page;
        box-shadow: none;
        transform: none;
      }
    }

    @page {
      size: 2.125in 3.375in;
      margin: 0;
    }
  </style>
</head>

<body ng-controller="IdCardCtrl" id="page-body" class="format-standard">

  <div class="control-bar">
    <div class="control-group">
      <label>Content Format</label>
      <select id="content-format-picker">
        <option value="1">1 — Standard</option>
        <option value="2">2 — Boxed Format</option>
        <option value="3">3 — Simple</option>
      </select>
    </div>
    <div class="control-group">
      <label>Background Image</label>
      <input type="number" id="background-image-id" min="1" max="102" step="1" style="width:70px" />
    </div>
    <div class="control-group">
      <label>Primary Color</label>
      <select id="school-color-picker"></select>
    </div>
    <div class="control-group">
      <label>Text Color</label>
      <select id="text-color-picker"></select>
    </div>
    <div class="control-group">
      <label>School Name Size</label>
      <input type="number" id="school-name-fontsize" min="6" max="40" step="1" style="width:70px" />
    </div>
    <div class="control-group">
      <label>Photo Height</label>
      <input type="number" id="student-photo-height" min="40" max="160" step="1" style="width:70px" />
    </div>
    <div class="control-group">
      <label>Photo Border Radius</label>
      <input type="number" id="student-photo-border-radius" min="0" max="50" step="1" style="width:70px" />
    </div>
    <div class="control-group">
      <label>Photo Fit</label>
      <select id="student-photo-object-fit">
        <option value="cover">cover</option>
        <option value="fill">fill</option>
      </select>
    </div>
    <div class="control-group">
      <label>Principal Signature</label>
      <input type="text" id="principal-signature-label" style="width:160px" />
    </div>
    <div class="control-group">
      <label>
        <input type="checkbox" id="school-name-twoline-toggle" />
        Two-line School Name
      </label>
    </div>
    <div class="control-panel-extra" id="school-name-twoline-panel">
      <div class="control-group">
        <label>Line 1</label>
        <input type="text" id="school-name-line1" style="width:160px" placeholder="Line 1" />
      </div>
      <div class="control-group">
        <label>Line 1 Font Size</label>
        <input type="number" id="school-name-line1-fontsize" min="6" max="40" step="1" style="width:70px" />
      </div>
      <div class="control-group">
        <label>Line 1 Font Family</label>
        <select id="school-name-line1-fontfamily">
          <optgroup label="Tier 1 – Universal">
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="Verdana, Geneva, sans-serif">Verdana</option>
            <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
            <option value='"Trebuchet MS", Helvetica, sans-serif'>Trebuchet MS</option>
            <option value="Georgia, serif">Georgia</option>
            <option value='"Times New Roman", Times, serif'>Times New Roman</option>

            <option value='"Trebuchet MS", Helvetica, sans-serif'>Trebuchet MS</option>
            <option value="Georgia, serif">Georgia</option>
            <option value='"Times New Roman", Times, serif'>Times New Roman</option>
            <option value='"Courier New", Courier, monospace'>Courier New</option>
          </optgroup>
          <optgroup label="Tier 2 – Mostly Available">

            <option value='"Palatino Linotype", "Book Antiqua", Palatino, serif'>Palatino</option>
            <option value="Garamond, serif">Garamond</option>

      <footer>
        <button type="button" id="settings-json-close-2">Close</button>
        <button type="button" class="primary" id="settings-json-copy">Copy to clipboard</button>
      </footer>

  <div id="id-card-grid" ng-bind-html="cardsHtml"></div>

<script>
const LS_KEYS = {
  school: "schoolColor",
  text: "textColor",
  schoolNameSize: "schoolNameFontSize",
  photoHeight: "studentPhotoHeight",
  photoBorderRadius: "studentPhotoBorderRadius",
  photoObjectFit: "studentPhotoObjectFit",
  contentFormat: "idCardContentFormat",
  principalLabel: "principalSignatureLabel",
  backgroundImage: "backgroundImageId",
  schoolNameTwoLine: "schoolNameTwoLine",
  schoolNameLine1: "schoolNameLine1",
  schoolNameLine2: "schoolNameLine2",
  schoolNameLine1FontSize: "schoolNameLine1FontSize",
  schoolNameLine1FontFamily: "schoolNameLine1FontFamily",
  schoolNameLine2FontSize: "schoolNameLine2FontSize",
  schoolNameLine2FontFamily: "schoolNameLine2FontFamily"
};

const SETTINGS_URL = "https://schoolvertex.github.io/Pages/IdCards/settings.json";
const DEFAULT_BG_IMAGE = 8;

const commonColors = [
  "Black","White","Gray","Silver","Red","Maroon","Yellow","Olive","Lime","Green",
  "Aqua","Teal","Blue","Navy","Fuchsia","Purple","AliceBlue","AntiqueWhite",
  "Aquamarine","Azure","Beige","Bisque","BlanchedAlmond","BlueViolet","Brown",
  "BurlyWood","CadetBlue","Chartreuse","Chocolate","Coral","CornflowerBlue",
  "Cornsilk","Crimson","Cyan","DarkBlue","DarkCyan","DarkGoldenRod","DarkGray",
  "DarkGreen","DarkKhaki","DarkMagenta","DarkOliveGreen","DarkOrange","DarkOrchid",
  "DarkRed","DarkSalmon","DarkSeaGreen","DarkSlateBlue","DarkSlateGray",
  "DarkTurquoise","DarkViolet","DeepPink","DeepSkyBlue","DimGray","DodgerBlue",
  "FireBrick","FloralWhite","ForestGreen","Gainsboro","GhostWhite","Gold",
  "GoldenRod","GreenYellow","HoneyDew","HotPink","IndianRed","Indigo","Ivory",
  "Khaki","Lavender","LavenderBlush","LawnGreen","LemonChiffon","LightBlue",
  "LightCoral","LightCyan","LightGoldenRodYellow","LightGray","LightGreen",
  "LightPink","LightSalmon","LightSeaGreen","LightSkyBlue","LightSlateGray",
  "LightSteelBlue","LightYellow","LimeGreen","Linen","Magenta","MediumAquaMarine",
  "MediumBlue","MediumOrchid","MediumPurple","MediumSeaGreen","MediumSlateBlue",
  "MediumSpringGreen","MediumTurquoise","MediumVioletRed","MidnightBlue","MintCream"
];

function populateColorDropdown(selectId, savedValue, defaultColor) {
  const select = document.getElementById(selectId);
  select.innerHTML = "";
  commonColors.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    opt.style.backgroundColor = name;
    opt.style.color = ["White","Ivory","LightYellow","Beige"].includes(name) ? "black" : "white";
    select.appendChild(opt);
  });
  setColorSelectValue(selectId, savedValue || defaultColor);
}

function resolveColorName(value, fallback) {
  if (!value) return fallback;
  const found = commonColors.find(c => c.toLowerCase() === String(value).toLowerCase());
  return found || String(value);
}

function setColorSelectValue(selectId, value) {
  const select = document.getElementById(selectId);
  const resolved = resolveColorName(value, select.options[0] ? select.options[0].value : "Blue");
  const match = Array.from(select.options).find(o => o.value.toLowerCase() === resolved.toLowerCase());
  if (match) {
    select.value = match.value;
  } else {
    const opt = document.createElement("option");
    opt.value = resolved;
    opt.textContent = resolved;
    opt.style.backgroundColor = resolved;
    select.appendChild(opt);
    select.value = resolved;
  }
}

function getOrgIdFromQuery() {
  return new URLSearchParams(location.search).get("orgid") || "1";
}

function getBackgroundImageId() {
  var raw = document.getElementById("background-image-id")
    ? document.getElementById("background-image-id").value
    : localStorage.getItem(LS_KEYS.backgroundImage);
  var n = parseInt(raw || DEFAULT_BG_IMAGE, 10);
  return isNaN(n) ? DEFAULT_BG_IMAGE : n;
}

function normalizeFormat(format) {
  var key = String(format == null ? "1" : format).toLowerCase();
  if (key === "2" || key === "ridgeboard" || key === "boxed") return "2";
  if (key === "3" || key === "simple") return "3";
  return "1";
}

function normalizePhotoObjectFit(value) {
  var key = String(value == null ? "cover" : value).toLowerCase().trim();
  return key === "fill" ? "fill" : "cover";
}

function applyPhotoObjectFit(value) {
  var fit = normalizePhotoObjectFit(value);
  var select = document.getElementById("student-photo-object-fit");
  if (select) select.value = fit;
  localStorage.setItem(LS_KEYS.photoObjectFit, fit);
  document.documentElement.style.setProperty("--student-photo-object-fit", fit);
  return fit;
}

function formatClassName(format) {
  var key = normalizeFormat(format);
  if (key === "2") return "format-ridgeboard";
  if (key === "3") return "format-simple";
  return "format-standard";
}

function getContentFormat() {
  var picker = document.getElementById("content-format-picker");
  if (picker && picker.value) {
    return normalizeFormat(picker.value);
  }
  return normalizeFormat(localStorage.getItem(LS_KEYS.contentFormat) || "1");
}

function getPrincipalLabel() {
  var input = document.getElementById("principal-signature-label");
  if (input && input.value !== undefined && input.value !== null && String(input.value).trim() !== "") {
    return String(input.value);
  }
  return localStorage.getItem(LS_KEYS.principalLabel) || "Principal Signature";
}

function isSchoolNameTwoLine() {
  return localStorage.getItem(LS_KEYS.schoolNameTwoLine) === "true";
}

function getSchoolNameLines(fallbackName) {
  var line1 = localStorage.getItem(LS_KEYS.schoolNameLine1);
  var line2 = localStorage.getItem(LS_KEYS.schoolNameLine2);
  if (line1 == null || line1 === "") {
    var parts = splitSchoolNameFallback(fallbackName || "");
    line1 = parts.line1;
    if (line2 == null) line2 = parts.line2;
  }
  if (line2 == null) line2 = "";
  return { line1: line1, line2: line2 };
}

function splitSchoolNameFallback(name) {
  if (!name) return { line1: "", line2: "" };
  var match = name.match(/^(.*?)\s+(International\s+School.*)$/i);
  if (match) return { line1: match[1], line2: match[2] };
  var parts = name.trim().split(/\s+/);
  if (parts.length > 2) {
    return { line1: parts.slice(0, 2).join(" "), line2: parts.slice(2).join(" ") };
  }
  return { line1: name, line2: "" };
}

function applySchoolNameLineStyles() {
  var size1El = document.getElementById("school-name-line1-fontsize");
  var family1El = document.getElementById("school-name-line1-fontfamily");
  var size2El = document.getElementById("school-name-line2-fontsize");
  var family2El = document.getElementById("school-name-line2-fontfamily");

  var size1 = (size1El && size1El.value) || localStorage.getItem(LS_KEYS.schoolNameLine1FontSize) || "12";
  var family1 = (family1El && family1El.value) || localStorage.getItem(LS_KEYS.schoolNameLine1FontFamily) || "Arial, Helvetica, sans-serif";
  var size2 = (size2El && size2El.value) || localStorage.getItem(LS_KEYS.schoolNameLine2FontSize) || "11";
  var family2 = (family2El && family2El.value) || localStorage.getItem(LS_KEYS.schoolNameLine2FontFamily) || "Arial, Helvetica, sans-serif";

  localStorage.setItem(LS_KEYS.schoolNameLine1FontSize, String(size1));
  localStorage.setItem(LS_KEYS.schoolNameLine1FontFamily, family1);
  localStorage.setItem(LS_KEYS.schoolNameLine2FontSize, String(size2));
  localStorage.setItem(LS_KEYS.schoolNameLine2FontFamily, family2);

  document.documentElement.style.setProperty("--school-name-line1-font-size", size1 + "px");
  document.documentElement.style.setProperty("--school-name-line1-font-family", family1);
  document.documentElement.style.setProperty("--school-name-line2-font-size", size2 + "px");
  document.documentElement.style.setProperty("--school-name-line2-font-family", family2);
}

function buildCurrentSettingsJson() {
  var settings = {
    Format: parseInt(getContentFormat(), 10) || 1,
    PrimaryColor: document.getElementById("school-color-picker").value || localStorage.getItem(LS_KEYS.school) || "Blue",
    TextColor: document.getElementById("text-color-picker").value || localStorage.getItem(LS_KEYS.text) || "Black",
    SchoolNameSize: parseInt(
      (document.getElementById("school-name-fontsize") && document.getElementById("school-name-fontsize").value) ||
      localStorage.getItem(LS_KEYS.schoolNameSize) ||
      "12",
      10
    ),
    PhotoHeight: parseInt(localStorage.getItem(LS_KEYS.photoHeight) || "80", 10),
    PhotoBorderRadius: parseInt(localStorage.getItem(LS_KEYS.photoBorderRadius) || "50", 10),
    PhotoObjectFit: normalizePhotoObjectFit(
      (document.getElementById("student-photo-object-fit") && document.getElementById("student-photo-object-fit").value) ||
      localStorage.getItem(LS_KEYS.photoObjectFit) ||
      "cover"
    ),
    BackgroundImage: getBackgroundImageId(),
    PrincipalSignature: getPrincipalLabel(),
    SchoolNameTwoLine: isSchoolNameTwoLine()
  };
  if (settings.SchoolNameTwoLine) {
    var lines = getSchoolNameLines((window.__idCardOrg && window.__idCardOrg.Name) || "");
    settings.SchoolNameLine1 = lines.line1;
    settings.SchoolNameLine2 = lines.line2;
    settings.SchoolNameLine1FontSize = parseInt(localStorage.getItem(LS_KEYS.schoolNameLine1FontSize) || "12", 10);
    settings.SchoolNameLine1FontFamily = localStorage.getItem(LS_KEYS.schoolNameLine1FontFamily) || "Arial, Helvetica, sans-serif";
    settings.SchoolNameLine2FontSize = parseInt(localStorage.getItem(LS_KEYS.schoolNameLine2FontSize) || "11", 10);
    settings.SchoolNameLine2FontFamily = localStorage.getItem(LS_KEYS.schoolNameLine2FontFamily) || "Arial, Helvetica, sans-serif";
  }
  return settings;
}

function openSettingsJsonModal() {
  var modal = document.getElementById("settings-json-modal");
  var preview = document.getElementById("settings-json-preview");
  preview.textContent = JSON.stringify(buildCurrentSettingsJson(), null, 2);
  modal.classList.add("is-open");
  modal.setAttribute("aria-hidden", "false");
}

function closeSettingsJsonModal() {
  var modal = document.getElementById("settings-json-modal");
  modal.classList.remove("is-open");
  modal.setAttribute("aria-hidden", "true");
}

async function copySettingsJson() {
  var text = document.getElementById("settings-json-preview").textContent;
  try {
    await navigator.clipboard.writeText(text);
    var btn = document.getElementById("settings-json-copy");
    var prev = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(function () { btn.textContent = prev; }, 1500);
  } catch (e) {
    prompt("Copy this settings JSON:", text);
  }
}

function renderSchoolNameHtml(orgName) {
  if (!isSchoolNameTwoLine()) {
    return `<span class="school-color school-name-dynamic">${escapeHtmlGlobal(orgName)}</span>`;
  }
  var lines = getSchoolNameLines(orgName);
  var line2 = lines.line2
    ? `<span class="school-name-line2">${escapeHtmlGlobal(lines.line2)}</span>`
    : "";
  return `<span class="school-color school-name-two-line"><span class="school-name-line1">${escapeHtmlGlobal(lines.line1)}</span>${line2}</span>`;
}

function escapeHtmlGlobal(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function applyPrincipalLabel(text) {
  document.querySelectorAll(".principal-label").forEach(el => {
    el.textContent = text;
  });
}

function applyBodyFormat(format) {
  const body = document.getElementById("page-body");
  body.classList.remove("format-standard", "format-ridgeboard", "format-simple");
  body.classList.add(formatClassName(format));
}

function setupPickers() {
  populateColorDropdown("school-color-picker", "Blue", "Blue");
  populateColorDropdown("text-color-picker", "Black", "Black");

  document.documentElement.style.setProperty("--school-color", "Blue");
  document.documentElement.style.setProperty("--text-color", "Black");

  const formatPicker = document.getElementById("content-format-picker");
  formatPicker.value = "1";
  localStorage.setItem(LS_KEYS.contentFormat, "1");
  applyBodyFormat("1");

  const bgImageInput = document.getElementById("background-image-id");
  bgImageInput.value = DEFAULT_BG_IMAGE;
  localStorage.setItem(LS_KEYS.backgroundImage, String(DEFAULT_BG_IMAGE));
  bgImageInput.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.backgroundImage, e.target.value);
  });

  formatPicker.addEventListener("change", e => {
    const format = normalizeFormat(e.target.value);
    formatPicker.value = format;
    localStorage.setItem(LS_KEYS.contentFormat, format);
    applyBodyFormat(format);
    window.dispatchEvent(new CustomEvent("idcard-format-change", { detail: { format } }));
  });

  document.getElementById("school-color-picker").addEventListener("input", e => {
    document.documentElement.style.setProperty("--school-color", e.target.value);
  });
  document.getElementById("school-color-picker").addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.school, e.target.value);
  });

  document.getElementById("text-color-picker").addEventListener("input", e => {
    document.documentElement.style.setProperty("--text-color", e.target.value);
  });
  document.getElementById("text-color-picker").addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.text, e.target.value);
  });

  const fontInput = document.getElementById("school-name-fontsize");
  fontInput.value = "12";
  document.documentElement.style.setProperty("--school-name-font-size", "12px");
  fontInput.addEventListener("input", e => {
    document.documentElement.style.setProperty("--school-name-font-size", e.target.value + "px");
  });
  fontInput.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.schoolNameSize, e.target.value);
  });

  const photoHeightInput = document.getElementById("student-photo-height");
  photoHeightInput.value = "80";
  document.documentElement.style.setProperty("--student-photo-height", "80px");
  photoHeightInput.addEventListener("input", e => {
    document.documentElement.style.setProperty("--student-photo-height", e.target.value + "px");
  });
  photoHeightInput.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.photoHeight, e.target.value);
  });

  const photoRadiusInput = document.getElementById("student-photo-border-radius");
  photoRadiusInput.value = "50";
  document.documentElement.style.setProperty("--student-photo-border-radius", "50%");
  photoRadiusInput.addEventListener("input", e => {
    document.documentElement.style.setProperty("--student-photo-border-radius", e.target.value + "%");
  });
  photoRadiusInput.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.photoBorderRadius, e.target.value);
  });

  applyPhotoObjectFit("cover");
  document.getElementById("student-photo-object-fit").addEventListener("change", e => {
    applyPhotoObjectFit(e.target.value);
  });

  const principalInput = document.getElementById("principal-signature-label");
  principalInput.value = "Principal Signature";
  localStorage.setItem(LS_KEYS.principalLabel, "Principal Signature");
  applyPrincipalLabel("Principal Signature");
  principalInput.addEventListener("input", e => {
    applyPrincipalLabel(e.target.value);
    localStorage.setItem(LS_KEYS.principalLabel, e.target.value);
  });
  principalInput.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.principalLabel, e.target.value);
    applyPrincipalLabel(e.target.value);
  });

  const twoLineToggle = document.getElementById("school-name-twoline-toggle");
  const twoLinePanel = document.getElementById("school-name-twoline-panel");
  const line1Input = document.getElementById("school-name-line1");
  const line2Input = document.getElementById("school-name-line2");
  const line1FontSizeInput = document.getElementById("school-name-line1-fontsize");
  const line1FontFamilySelect = document.getElementById("school-name-line1-fontfamily");
  const line2FontSizeInput = document.getElementById("school-name-line2-fontsize");
  const line2FontFamilySelect = document.getElementById("school-name-line2-fontfamily");

  twoLineToggle.checked = false;
  twoLinePanel.classList.remove("is-open");
  line1Input.value = "";
  line2Input.value = "";
  line1FontSizeInput.value = "12";
  line1FontFamilySelect.value = "Arial, Helvetica, sans-serif";
  line2FontSizeInput.value = "11";
  line2FontFamilySelect.value = "Arial, Helvetica, sans-serif";
  applySchoolNameLineStyles();

  function emitSchoolNameChange() {
    window.dispatchEvent(new CustomEvent("idcard-schoolname-change"));
  }

  function fillSplitIntoLineInputs() {
    var orgName = (window.__idCardOrg && window.__idCardOrg.Name) || "";
    var parts = splitSchoolNameFallback(orgName);
    line1Input.value = parts.line1;
    line2Input.value = parts.line2;
    localStorage.setItem(LS_KEYS.schoolNameLine1, parts.line1);
    localStorage.setItem(LS_KEYS.schoolNameLine2, parts.line2);
  }

  twoLineToggle.addEventListener("change", e => {
    const enabled = e.target.checked;
    localStorage.setItem(LS_KEYS.schoolNameTwoLine, enabled ? "true" : "false");
    twoLinePanel.classList.toggle("is-open", enabled);
    if (enabled) {
      fillSplitIntoLineInputs();
      applySchoolNameLineStyles();
    }
    emitSchoolNameChange();
  });

  line1Input.addEventListener("input", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine1, e.target.value);
    emitSchoolNameChange();
  });
  line2Input.addEventListener("input", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine2, e.target.value);
    emitSchoolNameChange();
  });

  line1FontSizeInput.addEventListener("input", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine1FontSize, e.target.value);
    document.documentElement.style.setProperty("--school-name-line1-font-size", e.target.value + "px");
  });
  line1FontSizeInput.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine1FontSize, e.target.value);
    applySchoolNameLineStyles();
  });
  line1FontFamilySelect.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine1FontFamily, e.target.value);
    document.documentElement.style.setProperty("--school-name-line1-font-family", e.target.value);
    applySchoolNameLineStyles();
  });

  line2FontSizeInput.addEventListener("input", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine2FontSize, e.target.value);
    document.documentElement.style.setProperty("--school-name-line2-font-size", e.target.value + "px");
  });
  line2FontSizeInput.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine2FontSize, e.target.value);
    applySchoolNameLineStyles();
  });
  line2FontFamilySelect.addEventListener("change", e => {
    localStorage.setItem(LS_KEYS.schoolNameLine2FontFamily, e.target.value);
    document.documentElement.style.setProperty("--school-name-line2-font-family", e.target.value);
    applySchoolNameLineStyles();
  });

  document.getElementById("show-settings-json-btn").addEventListener("click", openSettingsJsonModal);
  document.getElementById("settings-json-close").addEventListener("click", closeSettingsJsonModal);
  document.getElementById("settings-json-close-2").addEventListener("click", closeSettingsJsonModal);
  document.getElementById("settings-json-copy").addEventListener("click", copySettingsJson);
  document.getElementById("settings-json-modal").addEventListener("click", function (e) {
    if (e.target === this) closeSettingsJsonModal();
  });

  fetchAndApplySettings();
}

function applySettingsToControls(config) {
  if (!config) return;

  if (config.PrimaryColor) {
    const color = resolveColorName(config.PrimaryColor, "Blue");
    setColorSelectValue("school-color-picker", color);
    localStorage.setItem(LS_KEYS.school, color);
    document.documentElement.style.setProperty("--school-color", color);
  }

  if (config.TextColor) {
    const color = resolveColorName(config.TextColor, "Black");
    setColorSelectValue("text-color-picker", color);
    localStorage.setItem(LS_KEYS.text, color);
    document.documentElement.style.setProperty("--text-color", color);
  }

  if (config.SchoolNameSize !== undefined && config.SchoolNameSize !== null && config.SchoolNameSize !== "") {
    const size = String(config.SchoolNameSize).replace(/px$/i, "");
    const fontInput = document.getElementById("school-name-fontsize");
    if (fontInput) fontInput.value = size;
    localStorage.setItem(LS_KEYS.schoolNameSize, size);
    document.documentElement.style.setProperty("--school-name-font-size", size + "px");
  }

  if (config.PhotoHeight !== undefined && config.PhotoHeight !== null) {
    const h = String(config.PhotoHeight);
    document.getElementById("student-photo-height").value = h;
    localStorage.setItem(LS_KEYS.photoHeight, h);
    document.documentElement.style.setProperty("--student-photo-height", h + "px");
  }

  if (config.PhotoBorderRadius !== undefined && config.PhotoBorderRadius !== null) {
    const r = String(config.PhotoBorderRadius);
    document.getElementById("student-photo-border-radius").value = r;
    localStorage.setItem(LS_KEYS.photoBorderRadius, r);
    document.documentElement.style.setProperty("--student-photo-border-radius", r + "%");
  }

  if (config.PhotoObjectFit || config.PhotoFit) {
    applyPhotoObjectFit(config.PhotoObjectFit || config.PhotoFit);
  } else {
    applyPhotoObjectFit("cover");
  }

  if (config.BackgroundImage !== undefined && config.BackgroundImage !== null) {
    const bg = String(config.BackgroundImage);
    document.getElementById("background-image-id").value = bg;
    localStorage.setItem(LS_KEYS.backgroundImage, bg);
  }

  if (config.PrincipalSignature || config.PrincipalLabel) {
    const label = config.PrincipalSignature || config.PrincipalLabel;
    document.getElementById("principal-signature-label").value = label;
    localStorage.setItem(LS_KEYS.principalLabel, label);
    applyPrincipalLabel(label);
  } else {
    const label = "Principal Signature";
    document.getElementById("principal-signature-label").value = label;
    localStorage.setItem(LS_KEYS.principalLabel, label);
    applyPrincipalLabel(label);
  }

  if (config.SchoolNameTwoLine === true || config.SchoolNameTwoLine === 1 || config.SchoolNameTwoLine === "true") {
    const twoLineToggle = document.getElementById("school-name-twoline-toggle");
    const twoLinePanel = document.getElementById("school-name-twoline-panel");
    twoLineToggle.checked = true;
    twoLinePanel.classList.add("is-open");
    localStorage.setItem(LS_KEYS.schoolNameTwoLine, "true");

    if (config.SchoolNameLine1) {
      document.getElementById("school-name-line1").value = config.SchoolNameLine1;
      localStorage.setItem(LS_KEYS.schoolNameLine1, config.SchoolNameLine1);
    }
    if (config.SchoolNameLine2 !== undefined && config.SchoolNameLine2 !== null) {
      document.getElementById("school-name-line2").value = config.SchoolNameLine2;
      localStorage.setItem(LS_KEYS.schoolNameLine2, config.SchoolNameLine2);
    }
    if (config.SchoolNameLine1FontSize) {
      document.getElementById("school-name-line1-fontsize").value = config.SchoolNameLine1FontSize;
      localStorage.setItem(LS_KEYS.schoolNameLine1FontSize, String(config.SchoolNameLine1FontSize));
    } else if (config.SchoolNameSize !== undefined && config.SchoolNameSize !== null) {
      const size = String(config.SchoolNameSize).replace(/px$/i, "");
      document.getElementById("school-name-line1-fontsize").value = size;
      localStorage.setItem(LS_KEYS.schoolNameLine1FontSize, size);
    }
    if (config.SchoolNameLine2FontSize) {
      document.getElementById("school-name-line2-fontsize").value = config.SchoolNameLine2FontSize;
      localStorage.setItem(LS_KEYS.schoolNameLine2FontSize, String(config.SchoolNameLine2FontSize));
    }
    if (config.SchoolNameLine1FontFamily) {
      document.getElementById("school-name-line1-fontfamily").value = config.SchoolNameLine1FontFamily;
      localStorage.setItem(LS_KEYS.schoolNameLine1FontFamily, config.SchoolNameLine1FontFamily);
    }
    if (config.SchoolNameLine2FontFamily) {
      document.getElementById("school-name-line2-fontfamily").value = config.SchoolNameLine2FontFamily;
      localStorage.setItem(LS_KEYS.schoolNameLine2FontFamily, config.SchoolNameLine2FontFamily);
    }
    applySchoolNameLineStyles();
    window.dispatchEvent(new CustomEvent("idcard-schoolname-change"));
  }

  // Always apply format from settings; missing Format → Standard (1)
  {
    const format = normalizeFormat(
      config.Format !== undefined && config.Format !== null ? config.Format : "1"
    );
    localStorage.setItem(LS_KEYS.contentFormat, format);
    document.getElementById("content-format-picker").value = format;
    applyBodyFormat(format);
    window.dispatchEvent(new CustomEvent("idcard-format-change", { detail: { format } }));
  }
}

async function fetchAndApplySettings() {
  try {
    const orgId = getOrgIdFromQuery();
    const res = await fetch(SETTINGS_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const config = data[orgId] || data[String(orgId)] || data["All"] || {};
    applySettingsToControls(config);
    console.log("Loaded settings for orgid=" + orgId, config);
  } catch (err) {
    console.error("Failed to load settings.json — using defaults:", err);
  }
}

document.addEventListener("DOMContentLoaded", setupPickers);
</script>

<script>
angular.module('myApp', ['ngSanitize'])
.controller('IdCardCtrl', function ($scope, $http, $sce) {

  const baseUrl = "https://cdn.jsdelivr.net/gh/gitcdnsv/svcdn/IdCardBg/";
  const samplePhoto = "https://www.w3schools.com/html/img_girl.jpg";

  const backgrounds = Array.from({ length: 102 }, (_, i) => ({
    index: i + 1,
    url: baseUrl + (i + 1) + ".jpg",
    opacity: 1,
    size: "cover"
  }));

  const icons = {
    grade: '<svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>',
    adm: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4V6h16v12zM6 10h4v4H6v-4zm6 0h6v2h-6v-2zm0 4h4v2h-4v-2z"/></svg>',
    dob: '<svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zM7 12h5v5H7v-5z"/></svg>',
    parent: '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>',
    phone: '<svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.15 15.15 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C10.4 21 3 13.6 3 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/></svg>',
    address: '<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1114.5 9 2.5 2.5 0 0112 11.5z"/></svg>'
  };

  let orgData = null;

  function splitSchoolName(name) {
    return splitSchoolNameFallback(name);
  }

  function escapeHtml(str) {
    return escapeHtmlGlobal(str);
  }

  function buildStandardCard(org, bg) {
    return `
      <div class="id-card">
        <div class="card-identifier">${bg.index}</div>
        <div class="bg-image" style="background-image:url('${bg.url}');opacity:${bg.opacity};background-size:${bg.size};"></div>
        <div class="main-content">
          <div class="school-info">
            <div class="school-logo">
              <img src="${org.Image || ''}">
            </div>
            <div class="school-name">
              ${renderSchoolNameHtml(org.Name)}
              <p class="school-caption text-color">${escapeHtml(org.Caption || '')}</p>
              <p class="school-affliate text-color">${escapeHtml(org.Affiliation || '')}</p>
              <p class="school-address text-color">${escapeHtml(org.FullAddress || '')}</p>
            </div>
          </div>

          <div class="student-photo-area">
            <img src="${samplePhoto}">
          </div>

          <div class="student-name school-color">Student Name</div>

          <div class="student-info">
            <div class="info-row"><div class="info-label school-color">Grade</div><div class="info-value text-color">Grade 6 Sec B</div></div>
            <div class="info-row"><div class="info-label school-color">Adm' No</div><div class="info-value text-color">872</div></div>
            <div class="info-row"><div class="info-label school-color">D.O.B</div><div class="info-value text-color">26 Jun 2013</div></div>
            <div class="info-row"><div class="info-label school-color">P' Name</div><div class="info-value text-color">Father Name</div></div>
            <div class="info-row"><div class="info-label school-color">Address</div><div class="info-value text-color">Flat No 502, Block Sri Lakshmi Krishna Paradise, Wid Colony</div></div>
          </div>

          <div class="principal-signature-area">
            <div class="principal-sign"></div>
            <div class="principal-label text-color">${escapeHtml(getPrincipalLabel())}</div>
          </div>
        </div>
      </div>`;
  }

  function ridgeInfoRow(iconSvg, label, value, extraClass) {
    return `
      <div class="info-row${extraClass ? ' ' + extraClass : ''}">
        <div class="info-icon-cell"><span class="icon">${iconSvg}</span></div>
        <div class="info-label-cell">${label}</div>
        <div class="info-value">${value}</div>
      </div>`;
  }

  function buildRidgeboardCard(org, bg) {
    const nameParts = isSchoolNameTwoLine()
      ? getSchoolNameLines(org.Name)
      : splitSchoolName(org.Name);
    const caption = org.Caption || org.Description || "";
    const taglineHtml = caption
      ? `<div class="school-tagline"><span>${escapeHtml(caption)}</span></div>`
      : "";
    const line2Html = nameParts.line2
      ? `<span class="school-name-line2 school-title-sub">${escapeHtml(nameParts.line2)}</span>`
      : "";
    const titleClass = isSchoolNameTwoLine() ? "school-title school-name-two-line" : "school-title";

    return `
      <div class="id-card">
        <div class="card-identifier">${bg.index}</div>
        <div class="bg-image" style="background-image:url('${bg.url}');background-size:${bg.size};"></div>
        <div class="main-content">
          <div class="school-info">
            <div class="school-logo">
              <img src="${org.Image || ''}">
            </div>
            <div class="school-name-block">
              <span class="${titleClass}">
                <span class="school-name-line1">${escapeHtml(nameParts.line1)}</span>
                ${line2Html}
              </span>
              ${taglineHtml}
              <p class="school-address">${escapeHtml(org.FullAddress || '')}</p>
            </div>
          </div>

          <div class="header-divider"></div>

          <div class="student-photo-area">
            <img src="${samplePhoto}">
          </div>

          <div class="student-name-banner">Student Name</div>

          <div class="student-info">
            ${ridgeInfoRow(icons.grade, "Grade", "Grade 6 Sec B")}
            ${ridgeInfoRow(icons.adm, "Adm' No", "872")}
            ${ridgeInfoRow(icons.dob, "D.O.B", "26 Jun 2013")}
            ${ridgeInfoRow(icons.parent, "P' Name", "Father Name")}
            ${ridgeInfoRow(icons.phone, "Phone No", "9876543210")}
            ${ridgeInfoRow(icons.address, "Address", "Flat No 502, Block Sri Lakshmi Krishna Paradise, Wid Colony", "address-row")}
          </div>

          <div class="card-footer">
            <div class="principal-signature-area">
              <div class="principal-label">${escapeHtml(getPrincipalLabel())}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  function buildSimpleCard(org, bg) {
    return `
      <div class="id-card">
        <div class="card-identifier">${bg.index}</div>
        <div class="bg-image" style="background-image:url('${bg.url}');opacity:0.2;background-size:${bg.size};"></div>
        <div class="main-content">
          <div class="school-info">
            <div class="school-logo">
              <img src="${org.Image || ''}">
            </div>
            <div class="school-name">
              ${renderSchoolNameHtml(org.Name)}
              <p class="school-caption text-color">${escapeHtml(org.Caption || '')}</p>
              <p class="school-affliate text-color">${escapeHtml(org.Affiliation || '')}</p>
              <p class="school-address text-color">${escapeHtml(org.FullAddress || '')}</p>
            </div>
          </div>

          <div class="student-photo-area">
            <img src="${samplePhoto}">
          </div>

          <div class="student-name">Student Name</div>

          <div class="simple-class-info">
            <div class="simple-class-line">Grade 6</div>
          </div>

          <div class="principal-signature-area">
            <div class="principal-sign"></div>
            <div class="principal-label text-color">${escapeHtml(getPrincipalLabel())}</div>
          </div>
        </div>
      </div>`;
  }

  function buildCards(org) {
    orgData = org;
    window.__idCardOrg = org;
    const format = getContentFormat();
    applyBodyFormat(format);

    let html = "";
    backgrounds.forEach(bg => {
      if (format === "2") {
        html += buildRidgeboardCard(org, bg);
      } else if (format === "3") {
        html += buildSimpleCard(org, bg);
      } else {
        html += buildStandardCard(org, bg);
      }
    });

    $scope.cardsHtml = $sce.trustAsHtml(html);
    if (!$scope.$$phase) $scope.$applyAsync();
  }

  const orgId = new URLSearchParams(location.search).get("orgid") || 1;
  const apiUrl = `https://api.schoolvertex.com/api/Organisation/GetInfoForCertificate/${orgId}`;

  $http.get(apiUrl).then(res => buildCards(res.data));

  window.addEventListener("idcard-format-change", function () {
    if (orgData) {
      $scope.$apply(function () {
        buildCards(orgData);
      });
    }
  });

  window.addEventListener("idcard-schoolname-change", function () {
    if (orgData) {
      $scope.$apply(function () {
        buildCards(orgData);
      });
    }
  });
});
</script>
