<!DOCTYPE html>
<html lang="en" ng-app="myApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="https://reports.schoolvertex.com/IdCard/student.css">
    <style>
        .bg-image {
            background-size: 115%;
            opacity: 0.6;
        }

        .main-content {
            margin: 0;
            padding: 2mm;
        }

        .school-name {
            font-size: 14px; /* fallback; overridden by API via ng-style */
        }

        .student-photo-area img {
            object-fit: fill;
        }
    </style>
</head>

<body ng-controller="myCtrl">

    <!-- Single Card -->
    <div class="id-card" ng-if="userInfo && !userList.length">
        <div ng-include="'id-card-template.html'" ng-init="userInfo=userInfo"></div>
    </div>

    <!-- Bulk Cards -->
    <div class="id-card" ng-repeat="userInfo in userList">
        <div ng-include="'id-card-template.html'"></div>
    </div>

    <!-- Shared Card Template -->
    <script type="text/ng-template" id="id-card-template.html">
        <div class="bg-image" ng-style="bgStyle"></div>
        <div class="main-content">
            <div class="school-info" ng-style="{'border-bottom-color': primaryColor}">
                <div class="school-logo">
                    <img ng-src="{{org.Image}}" alt="School Logo">
                </div>
                <div class="school-name">
                    <span class="school-color" ng-style="{'color': primaryColor, 'font-size': schoolNameFontSize}">{{org.Name}}</span>
                    <p class="school-caption" ng-if="org.Description" ng-style="{'color': secondaryColor}">{{org.Description}}</p>
                    <p class="school-affliate" ng-if="org.AffiliationInfo" ng-style="{'color': secondaryColor}">{{org.AffiliationInfo}}</p>
                    <p class="school-address" ng-if="org.fullAddress" ng-style="{'color': secondaryColor}">{{org.fullAddress}}</p>
                    <p class="school-address" ng-if="org.Mobile" ng-style="{'color': secondaryColor}">PHONE: {{org.Mobile}}</p>
                </div>
            </div>

            <div class="student-photo-area">
                <img src="{{userInfo.Image}}" alt="Student Photo">
            </div>

            <div class="student-name" ng-style="{'color': primaryColor}">{{userInfo.StudentName}}</div>

            <div class="student-info">
                <div class="info-row">
                    <div class="info-label" ng-style="{'color': primaryColor}">Grade</div>
                    <div class="info-devider" ng-style="{'color': secondaryColor}">:</div>
                    <div class="info-value" ng-style="{'color': secondaryColor}">{{userInfo.ClassName}} <span ng-if="userInfo.SectionName"> /
                            {{userInfo.SectionName}}</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label" ng-style="{'color': primaryColor}">Adm' No</div>
                    <div class="info-devider" ng-style="{'color': secondaryColor}">:</div>
                    <div class="info-value" ng-style="{'color': secondaryColor}">{{userInfo.AdmissionNumber}}</div>
                </div>
                <div class="info-row">
                    <div class="info-label" ng-style="{'color': primaryColor}">D.O.B</div>
                    <div class="info-devider" ng-style="{'color': secondaryColor}">:</div>
                    <div class="info-value" ng-style="{'color': secondaryColor}">{{userInfo.DateOfBirth | date:'dd-MMM-yyyy'}}</div>
                </div>
                <div class="info-row">
                    <div class="info-label" ng-style="{'color': primaryColor}">P' Name</div>
                    <div class="info-devider" ng-style="{'color': secondaryColor}">:</div>
                    <div class="info-value" ng-style="{'color': secondaryColor}">{{userInfo.ParentName}}</div>
                </div>
                <div class="info-row">
                    <div class="info-label" ng-style="{'color': primaryColor}">Phone No</div>
                    <div class="info-devider" ng-style="{'color': secondaryColor}">:</div>
                    <div class="info-value" ng-style="{'color': secondaryColor}">{{userInfo.Mobile}}</div>
                </div>
                <div class="info-row">
                    <div class="info-label" ng-style="{'color': primaryColor}">Address</div>
                    <div class="info-devider" ng-style="{'color': secondaryColor}">:</div>
                    <div class="info-value" ng-style="{'color': secondaryColor}">{{userInfo.Address}}</div>
                </div>
            </div>

            <div class="principal-signature-area">
                <div class="principal-sign" ng-if="org.Sign">
                    <img ng-src="{{org.Sign}}" alt="Signature">
                </div>
                <div class="principal-label" ng-style="{'color': secondaryColor, 'border-top-color': secondaryColor}">Principal Signature</div>
            </div>
        </div>
    </script>

    <!-- Unified AngularJS Controller -->

        var app = angular.module("myApp", []);
        app.controller("myCtrl", function ($scope, $http) {
            $scope.userList = [];

            // ── Design Map: designNumber → background image URL (1–102) ──

                99: designBaseUrl + "99.jpg",
                100: designBaseUrl + "100.jpg",
                101: designBaseUrl + "101.jpg",
                102: designBaseUrl + "102.jpg"
            };

            // ── Fallback Defaults ──
            var defaults = {
                designNumber: 8,
                primaryColor: "#673AB7",
                secondaryColor: "#000000"
            };

            $scope.primaryColor = defaults.primaryColor;
            $scope.secondaryColor = defaults.secondaryColor;
            $scope.schoolNameFontSize = "14px";
            $scope.bgStyle = {
                'background-image': "url('" + designMap[defaults.designNumber] + "')"
            };

            // ── Query Parameters ──
            function getQueryParams() {
                var params = {};
                location.search
                    .substr(1)
                    .split("&")
                    .forEach(function (item) {
                        var parts = item.split("=");
                        if (parts[0]) params[parts[0]] = decodeURIComponent(parts[1] || "");
                    });
                return params;
            }

            var query = getQueryParams();
            var userId = query.userId;
            var classId = parseInt(query.classId || 0);
            var sectionId = parseInt(query.sectionId || 0);
            var orgId = query.orgId;

            // ── Fetch Organisation Info from API ──
            $scope.org = {};
            var orgApiUrl = "https://api.schoolvertex.com/api/Organisation/GetInfoForCertificate/" + orgId;
            $http.get(orgApiUrl).then(function (response) {
                var data = response.data;
                if (data) {
                    $scope.org = data;
                    if (data.FullAddress) {
                        $scope.org.fullAddress = data.FullAddress;
                    } else if (data.AddressInfo) {
                        var a = data.AddressInfo;
                        var parts = [a.Plot_HouseNumber, a.LandMark, a.Street, a.City, a.State, a.ZipCode].filter(Boolean);
                        $scope.org.fullAddress = parts.join(", ");
                    }
                    console.log("Organisation info loaded:", data);
                }
            }, function (error) {
                console.error("Organisation API failed:", error.status, error.statusText);
            });

            // ── Fetch Design Config from API ──
            var designApiUrl = "https://schoolvertex.github.io/Pages/IdCards/settings.json";
            $http.get(designApiUrl).then(function (response) {
                var config = response;
                config = config[orgId.toString()] || config["All"];
                if (config) {
                    if (config.BackgroundImage && designMap[config.BackgroundImage]) {
                        $scope.bgStyle = {
                            'background-image': "url('" + designMap[config.BackgroundImage] + "')"
                        };
                    }
                    if (config.PrimaryColor) {
                        $scope.primaryColor = config.PrimaryColor;
                    }
                    if (config.TextColor) {
                        $scope.secondaryColor = config.TextColor;
                    }
                    if (config.SchoolNameSize) {
                        $scope.schoolNameFontSize = config.SchoolNameSize + "px";
                    }
                    console.log("Design config loaded:", config);
                }
            }, function (error) {
                console.error("Design config API failed — using defaults:", error.status, error.statusText);
            });

            // ── Student Data (UNCHANGED) ──
            if (userId) {
                var url = "https://api.schoolvertex.com/api/Fee/GetIdCardInfo/" + orgId + "/" + userId;
                $http.get(url).then(function (response) {
                    $scope.userInfo = response.data;
                });
            } else if (sectionId > 0 || classId > 0) {
                var bulkUrl = null;
                if (sectionId > 0) {
                    bulkUrl = "https://api.schoolvertex.com/api/Fee/GetSectionIdCardInfo/" + sectionId;
                } else if (classId > 0) {
                    bulkUrl = "https://api.schoolvertex.com/api/Fee/GetBatchIdCardInfo/" + classId;
                }

                if (bulkUrl) {
                    $http.get(bulkUrl).then(function (response) {
                        $scope.userList = response.data;
                    });
                }
            }
        });
    </script>
</body>

</html>
